services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/invoices
      - PORT=3000
    volumes:
      - ./backend/src:/app/src
      - ./seed-data.json:/app/seed-data.json:ro
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000/api
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  mongo-data:
